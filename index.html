<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku Portal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            overflow: hidden;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: white;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        /* Main Content */
        #main-content {
            opacity: 0;
            transition: opacity 1s ease-in;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        /* Preview Card */
        .preview-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .preview-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 4rem;
        }

        .card-content {
            padding: 25px;
            text-align: center;
        }

        .card-content h2 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .card-content p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .play-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .preview-card:hover .play-btn {
            background-color: #2980b9;
        }

        /* Utility */
        .hidden {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        .visible {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">LOADING...</div>
    </div>

    <!-- Main Content -->
    <div id="main-content">
        <h1>遊戲大廳</h1>

        <div class="preview-card" onclick="window.location.href='Gomoku.html'">
            <div class="card-image">
                <svg width="400" height="400" viewBox="0 0 150 105" xmlns="http://www.w3.org/2000/svg">
                    <rect width="150" height="105" fill="#DCB35C" />
                    <!-- Grid Lines -->
                    <g stroke="#000" stroke-width="0.2">
                        <line x1="5" y1="5" x2="145" y2="5" /> <line x1="5" y1="15" x2="145" y2="15" />
                        <line x1="5" y1="25" x2="145" y2="25" /> <line x1="5" y1="35" x2="145" y2="35" />
                        <line x1="5" y1="45" x2="145" y2="45" /> <line x1="5" y1="55" x2="145" y2="55" />
                        <line x1="5" y1="65" x2="145" y2="65" /> <line x1="5" y1="75" x2="145" y2="75" />
                        <line x1="5" y1="85" x2="145" y2="85" /> <line x1="5" y1="95" x2="145" y2="95" />
                        <line x1="5" y1="5" x2="5" y2="100" /> <line x1="15" y1="5" x2="15" y2="100" />
                        <line x1="25" y1="5" x2="25" y2="100" /> <line x1="35" y1="5" x2="35" y2="100" />
                        <line x1="45" y1="5" x2="45" y2="100" /> <line x1="55" y1="5" x2="55" y2="100" />
                        <line x1="65" y1="5" x2="65" y2="100" /> <line x1="75" y1="5" x2="75" y2="100" />
                        <line x1="85" y1="5" x2="85" y2="100" /> <line x1="95" y1="5" x2="95" y2="100" />
                        <line x1="105" y1="5" x2="105" y2="100" /> <line x1="115" y1="5" x2="115" y2="100" />
                        <line x1="125" y1="5" x2="125" y2="100" /> <line x1="135" y1="5" x2="135" y2="100" />
                        <line x1="145" y1="5" x2="145" y2="100" />

                        <circle cx="65" cy="45" r="4.5" fill="black" />
                        <circle cx="65" cy="55" r="4.5" fill="black" />
                        <circle cx="65" cy="75" r="4.5" fill="black" />
                        <circle cx="75" cy="55" r="4.5" fill="black" />

                        <circle cx="75" cy="65" r="4.5" fill="white" stroke="#ccc" stroke-width="0.2" />
                        <circle cx="85" cy="55" r="4.5" fill="white" stroke="#ccc" stroke-width="0.2" />
                        <circle cx="95" cy="45" r="4.5" fill="white" stroke="#ccc" stroke-width="0.2" />
                    </g>
                </svg>
            </div>
            <div class="card-content">
                <h2>五子棋</h2>
                <p>挑戰五個同色棋子相連得勝!</p>
                <button class="play-btn">Play Now</button>
            </div>
        </div>

        <div class="preview-card" onclick="window.location.href='ChineseChess.html'">
            <div class="card-image">
                <svg width="400" height="400" viewBox="0 0 150 105" xmlns="http://www.w3.org/2000/svg">
                    <rect width="150" height="105" fill="#DCB35C" />
                    <!-- Grid Lines -->
                    <line x1="15" y1="15" x2="135" y2="15" stroke="#332211" stroke-width="1.2" />
                    <line x1="15" y1="45" x2="135" y2="45" stroke="#332211" stroke-width="0.8" />
                    <line x1="15" y1="75" x2="135" y2="75" stroke="#332211" stroke-width="0.8" />
                    <!-- <line x1="15" y1="105" x2="135" y2="105" stroke="#332211" stroke-width="1.2" /> -->
                    
                    <line x1="15" y1="15" x2="15" y2="105" stroke="#332211" stroke-width="1.2" />
                    <line x1="45" y1="15" x2="45" y2="105" stroke="#332211" stroke-width="0.8" />
                    <line x1="75" y1="15" x2="75" y2="105" stroke="#332211" stroke-width="0.8" />
                    <line x1="105" y1="15" x2="105" y2="105" stroke="#332211" stroke-width="0.8" />
                    <!-- <line x1="135" y1="15" x2="135" y2="105" stroke="#332211" stroke-width="1.2" /> -->
                    
                    <line x1="45" y1="15" x2="105" y2="75" stroke="#332211" stroke-width="0.8" />
                    <line x1="105" y1="15" x2="45" y2="75" stroke="#332211" stroke-width="0.8" />

                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.4"/>
                        </filter>
                    </defs>

                    <g filter="url(#shadow)">
                        <circle cx="45" cy="75" r="14.5" fill="#22252a" stroke="#48525d" stroke-width="1.2" />
                        <circle cx="45" cy="75" r="12" fill="none" stroke="#181a1e" stroke-width="1" />
                        <text x="45" y="80.5" font-family="Noto Serif CJK TC, SimSun, serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">砲</text>
                    </g>

                    <g filter="url(#shadow)">
                        <circle cx="75" cy="45" r="14.5" fill="#22252a" stroke="#48525d" stroke-width="1.2" />
                        <circle cx="75" cy="45" r="12" fill="none" stroke="#181a1e" stroke-width="1" />
                        <text x="75" y="50.5" font-family="Noto Serif CJK TC, SimSun, serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">士</text>
                    </g>

                    <g filter="url(#shadow)">
                        <circle cx="75" cy="15" r="14.5" fill="#22252a" stroke="#48525d" stroke-width="1.2" />
                        <circle cx="75" cy="15" r="12" fill="none" stroke="#181a1e" stroke-width="1" />
                        <text x="75" y="20.5" font-family="Noto Serif CJK TC, SimSun, serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">將</text>
                    </g>

                    <g filter="url(#shadow)">
                        <circle cx="105" cy="15" r="14.5" fill="#22252a" stroke="#48525d" stroke-width="1.2" />
                        <circle cx="105" cy="15" r="12" fill="none" stroke="#181a1e" stroke-width="1" />
                        <text x="105" y="20.5" font-family="Noto Serif CJK TC, SimSun, serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">士</text>
                    </g>                </svg>
            </div>
            <div class="card-content">
                <h2>象棋</h2>
                <p>挑戰擊殺將帥得勝!</p>
                <button class="play-btn">Play Now</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const loadingScreen = document.getElementById('loading-screen');
            const mainContent = document.getElementById('main-content');

            // Simulate a loading delay
            setTimeout(() => {
                loadingScreen.classList.add('hidden');
                mainContent.classList.add('visible');
            }, 2000);
        });
    </script>
</body>
</html>
