<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>五子棋專業版 - 規則強化版</title>
    <style>
        :root {
            --wood-color: #deb887;
            --wood-grain: #d2b48c;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-color: #2c3e50;
            color: white;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        #game-container {
            display: flex;
            gap: 20px;
            background: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* 左側棋盤區 */
        #board-side {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: var(--wood-color);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(210, 180, 140, 0.2) 10px,
                rgba(210, 180, 140, 0.2) 20px
            );
            border: 2px solid #5d4037;
            cursor: pointer;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            transition: filter 0.5s ease;
        }

        /* 勝利時棋盤變暗 */
        canvas.dimmed {
            filter: brightness(0.7);
            pointer-events: none;
        }

        /* 右側控制與紀錄區 */
        #control-side {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #2c3e50;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #7f8c8d;
        }

        .timer-display {
            font-size: 32px;
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            font-family: monospace;
        }

        /* 當前棋子圖示 */
        .current-piece-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 10px auto 0;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #history-log {
            height: 350px;
            overflow-y: auto;
            background: #ecf0f1;
            color: #333;
            padding: 10px;
            font-size: 14px;
            border-radius: 3px;
            display: flex;
            flex-direction: column; 
        }

        .history-item {
            border-bottom: 1px solid #ddd;
            padding: 4px 0;
        }

        .victory-log {
            color: #e74c3c;
            font-weight: bold;
            font-size: 16px;
        }

        .undo-item {
            color: #e67e22;
            font-weight: bold;
        }

        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
        }

        button {
            cursor: pointer;
            padding: 8px;
            background: #3498db;
            border: none;
            color: white;
            border-radius: 3px;
            transition: 0.2s;
        }

        button:hover { background: #2980b9; }
        input[type="number"] { width: 60px; padding: 2px; }
        label { font-size: 18px; }

    </style>
</head>
<body>

    <h1>五子棋專業版</h1>

    <div id="game-container">
        <!-- 左邊：棋盤 -->
        <div id="board-side">
            <canvas id="gomokuCanvas"></canvas>
        </div>

        <!-- 右邊：紀錄與控制 -->
        <div id="control-side">
            <div class="panel">
                <div class="timer-display" id="timer">--</div>
                <div id="piece-icon" class="current-piece-icon"></div>
                <div style="text-align: center; margin-top: 5px;">
                    <input type="checkbox" id="timer-enable" checked> <label for="timer-enable">啟用倒數 (自動下子)</label>
                </div>
            </div>

            <div class="panel controls-grid">
                <label>棋盤大小:</label>
                <input type="number" id="board-size" value="15" min="7" max="33">
                
                <label>回手次數:</label>
                <input type="number" id="undo-limit" value="3" min="1" max="99">

                <button onclick="game.init()" style="grid-column: span 2; font-size: 1.2rem;">重新開始</button>
                <button onclick="game.undo()" style="grid-column: span 2; font-size: 1.2rem;">回手 (Undo)</button>
            </div>

            <div class="panel">
                <strong style="color: #ecf0f1;">對弈紀錄 (最新在最上)</strong>
                <div id="history-log"></div>
            </div>
        </div>
    </div>

    <script>
    class Gomoku {
        constructor() {
            // DOM Elements
            this.els = {
                canvas: document.getElementById('gomokuCanvas'),
                ctx: document.getElementById('gomokuCanvas').getContext('2d'),
                log: document.getElementById('history-log'),
                timer: document.getElementById('timer'),
                pieceIcon: document.getElementById('piece-icon'),
                timerCheckbox: document.getElementById('timer-enable'),
                boardSizeInput: document.getElementById('board-size'),
                undoLimitInput: document.getElementById('undo-limit')
            };

            // Game State
            this.state = {
                boardSize: 15,
                cellSize: 30,
                grid: [],
                turn: 1, // 1: Black, 2: White
                history: [],
                remainingUndos: 0,
                winner: null,
                winningLine: [],
                isAnimating: false,
                isFirstMove: true,
                timeLeft: 10
            };

            this.timerInterval = null;
            this.initEventListeners();
        }

        initEventListeners() {
            this.els.canvas.addEventListener('click', (e) => this.handleClick(e));
            this.els.timerCheckbox.addEventListener('change', () => this.handleTimerCheckboxChange());
        }

        handleTimerCheckboxChange() {
            if (this.state.winner) return;
            if (this.els.timerCheckbox.checked) {
                if (!this.state.isFirstMove) this.startTimer();
            } else {
                this.stopTimer();
                this.els.timer.innerText = "--";
            }
        }

        init() {
            this.stopTimer();
            this.els.canvas.classList.remove('dimmed');

            // Load Config
            this.state.boardSize = Math.min(Math.max(parseInt(this.els.boardSizeInput.value) || 15, 8), 64);
            this.state.cellSize = 30;
            this.state.remainingUndos = parseInt(this.els.undoLimitInput.value) || 3;

            // Reset State
            this.els.canvas.width = this.state.boardSize * this.state.cellSize;
            this.els.canvas.height = this.state.boardSize * this.state.cellSize;
            this.state.grid = Array(this.state.boardSize).fill().map(() => Array(this.state.boardSize).fill(0));
            this.state.turn = 1;
            this.state.history = [];
            this.state.winner = null;
            this.state.winningLine = [];
            this.state.isAnimating = false;
            this.state.isFirstMove = true;

            this.els.log.innerHTML = "";
            this.addLog("遊戲開始");
            this.updateTurnUI();
            this.render();
            this.els.timer.innerText = "--";
        }

        updateTurnUI() {
            this.els.pieceIcon.style.backgroundColor = this.state.turn === 1 ? "black" : "white";
        }

        // --- CORE LOGIC ---

        handleClick(e) {
            if (this.state.winner || this.state.isAnimating) return;

            const rect = this.els.canvas.getBoundingClientRect();
            const scaleX = this.els.canvas.width / rect.width;
            const scaleY = this.els.canvas.height / rect.height;
            const x = Math.floor(((e.clientX - rect.left) * scaleX) / this.state.cellSize);
            const y = Math.floor(((e.clientY - rect.top) * scaleY) / this.state.cellSize);

            if (this.inBounds(x, y)) {
                this.attemptMove(x, y);
            }
        }

        attemptMove(x, y) {
            if (this.state.grid[y][x] !== 0) return;

            // Rule: Black cannot form two lines at once
            if (this.state.turn === 1 && this.countWinningLines(x, y, 1) > 1) {
                alert("規則錯誤：黑色禁止一次形成兩條五連！");
                return;
            }

            this.executeMove(x, y);
        }

        executeMove(x, y) {
            const { turn, history } = this.state;
            this.state.grid[y][x] = turn;
            history.push({ x, y, color: turn, isUndo: false });
            this.addLog(`玩家${turn === 1 ? '黑' : '白'}: (${x}, ${y})`);

            const winResult = this.checkWin(x, y, turn);
            if (winResult) {
                this.handleWin(turn, winResult);
            } else {
                this.handleNextTurn();
            }
        }

        handleWin(winner, winningLine) {
            this.state.winner = winner;
            this.state.winningLine = winningLine;
            this.addLog(`🎉 玩家${winner === 1 ? '黑' : '白'} 勝利!`, true);
            this.els.canvas.classList.add('dimmed');
            this.render();
            this.victoryAnimation();
            this.stopTimer();
        }

        handleNextTurn() {
            const wasFirstMove = this.state.isFirstMove;
            this.state.isFirstMove = false;
            this.state.turn = (this.state.turn === 1) ? 2 : 1;
            
            this.updateTurnUI();
            this.render();

            if (this.els.timerCheckbox.checked && !wasFirstMove) {
                this.startTimer();
            } else {
                this.stopTimer();
                this.els.timer.innerText = "--";
            }
        }

        undo() {
            if (this.state.history.length === 0 || this.state.winner) return;
            if (this.state.remainingUndos <= 0) {
                alert("回手次數已達上限！");
                return;
            }

            const last = this.state.history.pop();
            this.state.grid[last.y][last.x] = 0;
            this.addLog(`回手: 移除 (${last.x}, ${last.y})`, false, true);

            this.state.remainingUndos--;
            this.state.turn = (this.state.turn === 1) ? 2 : 1; 
            this.state.isFirstMove = this.state.history.length === 0;
            
            this.updateTurnUI();
            this.render();
            this.stopTimer();
            this.els.timer.innerText = "--";
        }

        // --- WIN DETECTION & AI ---

        checkWin(x, y, color) {
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
            for (const [dx, dy] of directions) {
                const line = this._getLine(x, y, dx, dy, color);
                if (line.length >= 5) return line;
            }
            return null;
        }

        _getLine(x, y, dx, dy, color) {
            const line = [{x, y}];
            for (let dir of [1, -1]) {
                for (let i = 1; i < 5; i++) {
                    const nx = x + dx * i * dir, ny = y + dy * i * dir;
                    if (this.inBounds(nx, ny) && this.state.grid[ny][nx] === color) {
                        line.push({x: nx, y: ny});
                    } else break;
                }
            }
            return line;
        }

        countWinningLines(x, y, color) {
            this.state.grid[y][x] = color;
            let lines = 0;
            const directions = [[1, 0], [0, 1], [1, 1], [1, -1]];
            for (const [dx, dy] of directions) {
                if (this._getLine(x, y, dx, dy, color).length >= 5) lines++;
            }
            this.state.grid[y][x] = 0;
            return lines;
        }

        aiMove() {
            if (this.state.winner) return;
            const color = this.state.turn;
            let candidates = [];

            for (let y = 0; y < this.state.boardSize; y++) {
                for (let x = 0; x < this.state.boardSize; x++) {
                    if (this.state.grid[y][x] === 0) {
                        let score = 0;
                        for (let dy = -1; dy <= 1; dy++) {
                            for (let dx = -1; dx <= 1; dx++) {
                                if (dx === 0 && dy === 0) continue;
                                const nx = x + dx, ny = y + dy;
                                if (this.inBounds(nx, ny) && this.state.grid[ny][nx] === color) score += 1;
                            }
                        }
                        candidates.push({x, y, score});
                    }
                }
            }

            if (candidates.length > 0) {
                candidates.sort((a, b) => b.score - a.score);
                const maxScore = candidates[0].score;
                const top = candidates.filter(c => c.score === maxScore);
                const choice = top[Math.floor(Math.random() * top.length)];
                this.executeMove(choice.x, choice.y);
            }
        }

        // --- UTILITIES ---

        inBounds(x, y) {
            return x >= 0 && x < this.state.boardSize && y >= 0 && y < this.state.boardSize;
        }

        startTimer() {
            this.stopTimer();
            this.state.timeLeft = 10;
            this.els.timer.innerText = this.state.timeLeft;
            this.timerInterval = setInterval(() => {
                this.state.timeLeft--;
                this.els.timer.innerText = this.state.timeLeft;
                if (this.state.timeLeft <= 0) {
                    this.stopTimer();
                    this.aiMove();
                }
            }, 1000);
        }

        stopTimer() {
            if (this.timerInterval) {
                clearInterval(this.timerInterval);
                this.timerInterval = null;
            }
        }

        addLog(msg, isVictory = false, isUndo = false) {
            const div = document.createElement('div');
            div.className = isVictory ? 'history-item victory-log' : (isUndo ? 'history-item undo-item' : 'history-item');
            div.innerText = msg;
            this.els.log.prepend(div);
        }

        // --- RENDERING ---

        render(flashConfig = null) {
            const { ctx, canvas } = this.els;
            const { boardSize, cellSize } = this.state;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            this._drawGrid(boardSize, cellSize);
            this._drawPieces(flashConfig);
        }

        _drawGrid(size, cs) {
            const { ctx } = this.els;
            ctx.beginPath();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1;
            for (let i = 0; i < size; i++) {
                ctx.moveTo(cs / 2, cs / 2 + i * cs);
                ctx.lineTo(cs / 2 + (size - 1) * cs, cs / 2 + i * cs);
                ctx.moveTo(cs / 2 + i * cs, cs / 2);
                ctx.lineTo(cs / 2 + i * cs, cs / 2 + (size - 1) * cs);
            }
            ctx.stroke();
        }

        _drawPieces(flashConfig) {
            const { ctx } = this.els;
            const { boardSize, cellSize: cs, grid, winningLine } = this.state;
            for (let y = 0; y < boardSize; y++) {
                for (let x = 0; x < boardSize; x++) {
                    if (grid[y][x] !== 0) {
                        let color = grid[y][x] === 1 ? "#000" : "#fff";
                        let stroke = "#333";
                        if (flashConfig && flashConfig.isFlash && winningLine.some(p => p.x === x && p.y === y)) {
                            color = "#ffeb3b"; 
                        }
                        this._drawSinglePiece(x, y, color, stroke);
                    }
                }
            }
        }

        _drawSinglePiece(x, y, color, stroke) {
            const { ctx } = this.els;
            const cs = this.state.cellSize;
            const cx = cs / 2 + x * cs;
            const cy = cs / 2 + y * cs;
            const radius = cs * 0.4;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = stroke;
            ctx.stroke();
        }

        victoryAnimation() {
            this.state.isAnimating = true;
            let frame = 0;
            const animate = () => {
                frame++;
                this.render({ isFlash: frame % 2 === 0 });
                if (frame < 20) requestAnimationFrame(animate);
                else { this.state.isAnimating = false; this.render(); }
            };
            animate();
        }
    }

    const game = new Gomoku();
    game.init();
    </script>
</body>
</html>
